<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{TITLE}} | ASCEND Blog</title>
    <meta name="description" content="{{META_DESCRIPTION}}">
    <link href="https://api.fontshare.com/v2/css?f[]=general-sans@400,500,700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #000; color: #fff; font-family: 'General Sans', sans-serif; }
        .glass-nav { background: rgba(0,0,0,0.85); backdrop-filter: blur(20px); border-bottom: 1px solid rgba(255,255,255,0.08); }
        .blog-content h2 { font-size: 28px; font-weight: bold; margin-top: 40px; margin-bottom: 16px; color: #2563eb;}
        .blog-content p { font-size: 18px; color: rgba(255,255,255,0.7); line-height: 1.8; margin-bottom: 24px; }
        .blog-content ul { list-style-type: disc; padding-left: 20px; color: rgba(255,255,255,0.7); margin-bottom: 24px; }
        .blog-content li { margin-bottom: 10px; }
    </style>
</head>
<body>
    <nav class="glass-nav fixed top-0 w-full z-50 px-6 md:px-[120px] py-[20px] flex justify-between items-center">
        <a href="/" class="text-[24px] font-bold tracking-tighter text-white no-underline">ASCEND</a>
        <a href="/" class="text-[14px] font-medium opacity-70 hover:opacity-100 transition-opacity text-white no-underline">← Back to System</a>
    </nav>

    <main class="pt-32 pb-24 container mx-auto px-6 max-w-3xl">
        <span class="text-[#2563eb] text-sm font-bold uppercase tracking-widest">{{DATE}}</span>
        <h1 class="text-4xl md:text-5xl font-bold mt-4 mb-8 leading-tight">{{TITLE}}</h1>
        
        <div class="w-full h-px bg-white/10 mb-12"></div>

        <article class="blog-content">
            {{CONTENT}}
        </article>
    </main>
</body>
</html>
